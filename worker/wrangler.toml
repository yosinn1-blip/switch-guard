name = "switch-guard"
main = "src/index.ts"
compatibility_date = "2024-11-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 0 * * *"]  # 毎日00:00 UTC = 09:00 JST

[vars]
APP_BASE_URL = "https://yosinn1-blip.github.io/switch-guard"

# Secrets（wrangler secret put で設定）:
# SUPABASE_URL
# SUPABASE_KEY
# WORKER_SECRET
# NOTIFY_EMAIL
# RESEND_API_KEY
